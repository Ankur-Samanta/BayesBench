# Conda is used only to provision the Python interpreter and an isolated environment.
# All library dependencies are installed with pip from requirements.txt:
#   conda env create -f environment.yml
#   conda activate bayesbench
#   pip install -r requirements.txt
#   pip install -e .
name: bayesbench
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
